name: Build and cache ollama

on:
  schedule:
    - cron: '0 3 * * 1'   # Weekly rebuild on Mondays
  push:
    branches: [main]
  workflow_dispatch:        # Manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            system-features = nixos-test benchmark big-parallel

      - name: Update flakes
        run: nix flake update

      - uses: cachix/cachix-action@v15
        with:
          name: ladent          # <-- your cache name
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build ollama
        run: nix build .#default --print-build-logs

      - name: Push to Cachix
        run: nix-store --query --requisites ./result | cachix push ladent

      # 4. Commit the updated flake.lock so the pin is preserved
      - name: Commit updated flake.lock
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flake.lock
          git diff --staged --quiet || git commit -m "chore: update flake.lock"
          git push

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Cache build failed: ${new Date().toISOString()}`,
              body: `Check the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`
            })