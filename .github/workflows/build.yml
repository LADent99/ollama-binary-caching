name: Build and cache ollama

on:
  schedule:
    - cron: '0 3 * * 1'   # Weekly rebuild on Mondays
  push:
    branches: [main]
  workflow_dispatch:        # Manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            system-features = nixos-test benchmark big-parallel
            experimental-features = nix-command flakes
      
      - uses: cachix/cachix-action@v15
        with:
          name: ladent
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      
      - name: Update flakes
        run: nix flake update && ls && pwd
      
      - name: Build ollama
        run: nix build .#default --print-build-logs --refresh && ls

      - name: Push to Cachix
        run: nix-store --query --requisites ./result | cachix push ladent && ls

      - name: Check if flake.lock changed
        id: flake-lock-changed
        run: |
          git diff --quiet flake.lock && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit updated flake.lock to branch
        if: steps.flake-lock-changed.outputs.changed == 'true'
        run: |
          ls
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git switch -c update-flake-lock-${{ github.run_id }}
          git add flake.lock
          git commit -m "chore: update flake.lock"
          git push --set-upstream origin update-flake-lock-${{ github.run_id }}
          gh pr create \
            --title "Weekly flake.lock update" \
            --body "Automated weekly update of flake inputs." \
            --base main \
            --head update-flake-lock-${{ github.run_id }}

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Cache build failed: ${new Date().toISOString()}`,
              body: `Check the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`
            })