name: Build and cache ollama

on:
  schedule:
    - cron: '0 3 * * 1'   # Weekly rebuild on Mondays
  push:
    branches: [main]
  workflow_dispatch:        # Manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            system-features = nixos-test benchmark big-parallel
      
      - uses: cachix/cachix-action@v15
        with:
          name: ladent
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      
      - name: Update flakes
        run: nix flake update

      - name: Build ollama
        run: nix build .#default --print-build-logs --refresh

      - name: Push to Cachix
        run: nix-store --query --requisites ./result | cachix push ladent

      - name: Commit updated flake.lock to branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b update-flake-lock-${{ github.run_id }}
          git add flake.lock
          git diff --staged --quiet || git commit -m "chore: update flake.lock"
          git push origin update-flake-lock-${{ github.run_id }}

      - uses: peter-evans/create-pull-request@v6
        with:
          branch: update-flake-lock-${{ github.run_id }}
          title: "Weekly flake.lock update"
          body: |
            Automated weekly update of flake inputs.
            Ollama has been pre-built and pushed to Cachix against this exact lock file.
            Safe to merge — binary is already cached.
          base: main

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Cache build failed: ${new Date().toISOString()}`,
              body: `Check the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`
            })